name: Product Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "User-facing version, for example 1.0.1"
        required: true
        type: string
      create_release:
        description: "Create a GitHub Release and upload APK/AAB"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

env:
  BUILD_NUMBER_OFFSET: 1000

concurrency:
  group: product-release
  cancel-in-progress: false

jobs:
  build-product:
    name: Build product APK and AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Validate release inputs
        id: release
        env:
          DEFAULT_CONFIG_URL: ${{ vars.PRODUCT_CONFIG_URL }}
          VERSION_NAME: ${{ inputs.version_name }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "${VERSION_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version_name must look like 1.0.1" >&2
            exit 1
          fi

          build_number="$((GITHUB_RUN_NUMBER + BUILD_NUMBER_OFFSET))"

          current_version="$(ruby -ne 'puts $1 if /^version:\s*(\S+)/' pubspec.yaml)"
          current_build="0"
          if [[ "${current_version}" == *"+"* ]]; then
            current_build="${current_version##*+}"
          fi
          if [[ "${build_number}" -le "${current_build}" ]]; then
            echo "generated build_number (${build_number}) must be greater than current build (${current_build})" >&2
            exit 1
          fi

          config_url="${DEFAULT_CONFIG_URL:-}"
          if [[ -n "${config_url}" ]]; then
            echo "::add-mask::${config_url}"
            echo "Product config URL is set."
            config_status="已启用远程配置"
          else
            echo "Product config URL is empty. Building without remote promotion or popup config."
            config_status="未配置远程配置，构建干净包"
          fi

          previous_tag="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)"
          tag="v${VERSION_NAME}+${build_number}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Release tag ${tag} already exists." >&2
            exit 1
          fi

          artifact_slug="shenghui-${VERSION_NAME}+${build_number}"

          {
            echo "PRODUCT_CONFIG_URL<<EOF"
            echo "${config_url}"
            echo "EOF"
          } >> "${GITHUB_ENV}"

          echo "version=${VERSION_NAME}" >> "${GITHUB_OUTPUT}"
          echo "build=${build_number}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "artifact_slug=${artifact_slug}" >> "${GITHUB_OUTPUT}"
          echo "config_status=${config_status}" >> "${GITHUB_OUTPUT}"
          echo "previous_tag=${previous_tag}" >> "${GITHUB_OUTPUT}"

      - name: Set product version
        env:
          VERSION_NAME: ${{ steps.release.outputs.version }}
          BUILD_NUMBER: ${{ steps.release.outputs.build }}
        run: |
          ruby -0pi -e 'sub(/^version: .*\n/, "version: #{ENV.fetch("VERSION_NAME")}+#{ENV.fetch("BUILD_NUMBER")}\n")' pubspec.yaml
          grep '^version:' pubspec.yaml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build APK
        run: |
          flutter build apk --release \
            --build-name="${{ steps.release.outputs.version }}" \
            --build-number="${{ steps.release.outputs.build }}" \
            --dart-define=SHENGHUI_PRODUCT_CONFIG_URL="${PRODUCT_CONFIG_URL}"

      - name: Build App Bundle
        run: |
          flutter build appbundle --release \
            --build-name="${{ steps.release.outputs.version }}" \
            --build-number="${{ steps.release.outputs.build }}" \
            --dart-define=SHENGHUI_PRODUCT_CONFIG_URL="${PRODUCT_CONFIG_URL}"

      - name: Prepare release artifacts
        run: |
          mkdir -p release-artifacts
          cp build/app/outputs/flutter-apk/app-release.apk "release-artifacts/${{ steps.release.outputs.artifact_slug }}.apk"
          cp build/app/outputs/bundle/release/app-release.aab "release-artifacts/${{ steps.release.outputs.artifact_slug }}.aab"
          shasum -a 256 release-artifacts/* > release-artifacts/SHA256SUMS.txt

      - name: Generate release notes
        env:
          VERSION_NAME: ${{ steps.release.outputs.version }}
          BUILD_NUMBER: ${{ steps.release.outputs.build }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
          PREVIOUS_TAG: ${{ steps.release.outputs.previous_tag }}
          ARTIFACT_SLUG: ${{ steps.release.outputs.artifact_slug }}
          CONFIG_STATUS: ${{ steps.release.outputs.config_status }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${PREVIOUS_TAG}" ]]; then
            changelog_range="${PREVIOUS_TAG}..HEAD"
            compare_url="https://github.com/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${TAG_NAME}"
          else
            changelog_range="HEAD"
            compare_url="https://github.com/${GITHUB_REPOSITORY}/commits/${TAG_NAME}"
          fi

          {
            echo "## 本次发布"
            echo
            echo "- 版本：\`${VERSION_NAME}+${BUILD_NUMBER}\`"
            echo "- 构建分支：\`main\`"
            echo "- 远程配置：${CONFIG_STATUS}"
            echo
            echo "## 下载"
            echo
            echo "- Android APK：\`${ARTIFACT_SLUG}.apk\`"
            echo "- Android App Bundle：\`${ARTIFACT_SLUG}.aab\`"
            echo "- 文件校验：\`SHA256SUMS.txt\`"
            echo
            echo "## 更新内容"
            echo
          } > release-notes.md

          git log --pretty=format:'- %s (`%h`)' "${changelog_range}" \
            | grep -v '^- chore: release ' > release-commits.md || true
          if [[ -s release-commits.md ]]; then
            cat release-commits.md >> release-notes.md
          else
            echo "- 本次发布主要包含版本构建和安装包产物更新。" >> release-notes.md
          fi

          {
            echo
            echo "## 完整变更"
            echo
            echo "${compare_url}"
          } >> release-notes.md

      - name: Commit product version and tag
        env:
          TAG_NAME: ${{ steps.release.outputs.tag }}
          VERSION_NAME: ${{ steps.release.outputs.version }}
          BUILD_NUMBER: ${{ steps.release.outputs.build }}
        run: |
          git add pubspec.yaml pubspec.lock
          git commit -m "chore: release v${VERSION_NAME}+${BUILD_NUMBER}"
          git tag -a "${TAG_NAME}" -m "Release v${VERSION_NAME}+${BUILD_NUMBER}"
          git push origin HEAD:main
          git push origin "${TAG_NAME}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release.outputs.artifact_slug }}
          path: release-artifacts/*
          retention-days: 30

      - name: Create GitHub Release
        if: inputs.create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: 声绘 ${{ steps.release.outputs.version }} (${{ steps.release.outputs.build }})
          body_path: release-notes.md
          files: release-artifacts/*
          make_latest: true
