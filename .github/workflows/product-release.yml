name: Product Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "User-facing version, for example 1.0.1"
        required: true
        type: string
      release_notes:
        description: "Release notes shown in the GitHub Release"
        required: true
        type: string
      create_release:
        description: "Create a GitHub Release and upload APK/AAB"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: product-release
  cancel-in-progress: false

jobs:
  build-product:
    name: Build product APK and AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Validate release inputs
        id: release
        env:
          DEFAULT_CONFIG_URL: ${{ vars.PRODUCT_CONFIG_URL }}
          MIN_BUILD_NUMBER: ${{ vars.PRODUCT_MIN_BUILD_NUMBER }}
          VERSION_NAME: ${{ inputs.version_name }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "${VERSION_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version_name must look like 1.0.1" >&2
            exit 1
          fi

          build_number="${GITHUB_RUN_NUMBER}"
          if [[ -n "${MIN_BUILD_NUMBER:-}" ]]; then
            if [[ ! "${MIN_BUILD_NUMBER}" =~ ^[0-9]+$ ]]; then
              echo "PRODUCT_MIN_BUILD_NUMBER must be a positive integer" >&2
              exit 1
            fi
            if [[ "${build_number}" -lt "${MIN_BUILD_NUMBER}" ]]; then
              build_number="${MIN_BUILD_NUMBER}"
            fi
          fi

          current_version="$(ruby -ne 'puts $1 if /^version:\s*(\S+)/' pubspec.yaml)"
          current_build="0"
          if [[ "${current_version}" == *"+"* ]]; then
            current_build="${current_version##*+}"
          fi
          if [[ "${build_number}" -le "${current_build}" ]]; then
            build_number="$((current_build + 1))"
          fi

          config_url="${DEFAULT_CONFIG_URL:-}"
          if [[ -n "${config_url}" ]]; then
            echo "::add-mask::${config_url}"
            echo "Product config URL is set."
          else
            echo "Product config URL is empty. Building without remote promotion or popup config."
          fi

          tag="v${VERSION_NAME}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Release tag ${tag} already exists." >&2
            exit 1
          fi

          artifact_slug="shenghui-${VERSION_NAME}"

          {
            echo "PRODUCT_CONFIG_URL<<EOF"
            echo "${config_url}"
            echo "EOF"
          } >> "${GITHUB_ENV}"

          echo "version=${VERSION_NAME}" >> "${GITHUB_OUTPUT}"
          echo "build=${build_number}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "artifact_slug=${artifact_slug}" >> "${GITHUB_OUTPUT}"

      - name: Set product version
        env:
          VERSION_NAME: ${{ steps.release.outputs.version }}
          BUILD_NUMBER: ${{ steps.release.outputs.build }}
        run: |
          ruby -0pi -e 'sub(/^version: .*\n/, "version: #{ENV.fetch("VERSION_NAME")}+#{ENV.fetch("BUILD_NUMBER")}\n")' pubspec.yaml
          grep '^version:' pubspec.yaml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Configure Android release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          has_any_signing_secret=false
          for value in "${ANDROID_KEYSTORE_BASE64:-}" "${ANDROID_KEYSTORE_PASSWORD:-}" "${ANDROID_KEY_ALIAS:-}" "${ANDROID_KEY_PASSWORD:-}"; do
            if [[ -n "${value}" ]]; then
              has_any_signing_secret=true
            fi
          done

          if [[ "${has_any_signing_secret}" == false ]]; then
            echo "Android release signing secrets are empty. Release will fall back to debug signing."
            exit 0
          fi

          missing=()
          [[ -n "${ANDROID_KEYSTORE_BASE64:-}" ]] || missing+=("ANDROID_KEYSTORE_BASE64")
          [[ -n "${ANDROID_KEYSTORE_PASSWORD:-}" ]] || missing+=("ANDROID_KEYSTORE_PASSWORD")
          [[ -n "${ANDROID_KEY_ALIAS:-}" ]] || missing+=("ANDROID_KEY_ALIAS")

          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing Android release signing secrets: ${missing[*]}"
            exit 1
          fi

          mkdir -p android/app
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > android/app/release-keystore.jks
          {
            echo "storeFile=app/release-keystore.jks"
            echo "storePassword=${ANDROID_KEYSTORE_PASSWORD}"
            echo "keyAlias=${ANDROID_KEY_ALIAS}"
            echo "keyPassword=${ANDROID_KEY_PASSWORD:-${ANDROID_KEYSTORE_PASSWORD}}"
          } > android/key.properties

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build APK
        run: |
          flutter build apk --release \
            --build-name="${{ steps.release.outputs.version }}" \
            --build-number="${{ steps.release.outputs.build }}" \
            --dart-define=SHENGHUI_PRODUCT_CONFIG_URL="${PRODUCT_CONFIG_URL}"

      - name: Build App Bundle
        run: |
          flutter build appbundle --release \
            --build-name="${{ steps.release.outputs.version }}" \
            --build-number="${{ steps.release.outputs.build }}" \
            --dart-define=SHENGHUI_PRODUCT_CONFIG_URL="${PRODUCT_CONFIG_URL}"

      - name: Prepare release artifacts
        run: |
          mkdir -p release-artifacts
          cp build/app/outputs/flutter-apk/app-release.apk "release-artifacts/${{ steps.release.outputs.artifact_slug }}.apk"
          cp build/app/outputs/bundle/release/app-release.aab "release-artifacts/${{ steps.release.outputs.artifact_slug }}.aab"
          shasum -a 256 release-artifacts/* > release-artifacts/SHA256SUMS.txt

      - name: Generate release notes
        env:
          VERSION_NAME: ${{ steps.release.outputs.version }}
          BUILD_NUMBER: ${{ steps.release.outputs.build }}
          ARTIFACT_SLUG: ${{ steps.release.outputs.artifact_slug }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "## 本次发布"
            echo
            echo "- 版本：\`${VERSION_NAME}\`"
            echo "- 构建号：\`${BUILD_NUMBER}\`"
            echo "- 构建分支：\`main\`"
            echo
            echo "## 下载"
            echo
            echo "- Android APK：\`${ARTIFACT_SLUG}.apk\`"
            echo "- Android App Bundle：\`${ARTIFACT_SLUG}.aab\`"
            echo "- 文件校验：\`SHA256SUMS.txt\`"
            echo
            echo "## 更新内容"
            echo
            printf '%s\n' "${RELEASE_NOTES}"
          } > release-notes.md

      - name: Commit product version and tag
        env:
          TAG_NAME: ${{ steps.release.outputs.tag }}
          VERSION_NAME: ${{ steps.release.outputs.version }}
        run: |
          git add pubspec.yaml pubspec.lock
          git commit -m "chore: release v${VERSION_NAME}"
          git tag -a "${TAG_NAME}" -m "Release v${VERSION_NAME}"
          git push origin HEAD:main
          git push origin "${TAG_NAME}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release.outputs.artifact_slug }}
          path: release-artifacts/*
          retention-days: 30

      - name: Create GitHub Release
        if: inputs.create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: 声绘 ${{ steps.release.outputs.version }}
          body_path: release-notes.md
          files: release-artifacts/*
          make_latest: true
