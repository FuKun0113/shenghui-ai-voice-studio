name: Publish Remote Config

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - config/shenghui-config.json
      - .github/workflows/publish-remote-config.yml

permissions:
  contents: read

env:
  CONFIG_FILE: config/shenghui-config.json
  R2_OBJECT_KEY: shenghui-config.json

jobs:
  publish:
    name: Validate and publish JSON to R2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON
        run: jq empty config/shenghui-config.json

      - name: Configure R2 credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws-region: auto

      - name: Publish to R2
        run: |
          aws s3 cp "$CONFIG_FILE" "s3://${{ secrets.R2_BUCKET }}/$R2_OBJECT_KEY" \
            --endpoint-url "https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com" \
            --content-type "application/json; charset=utf-8" \
            --cache-control "public, max-age=60, stale-while-revalidate=300"
