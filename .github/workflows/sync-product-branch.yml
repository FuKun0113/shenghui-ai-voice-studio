name: Sync product branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-product-branch
  cancel-in-progress: true

env:
  PRODUCT_BRANCH: product/official-release

jobs:
  sync-product-branch:
    name: Merge main into product branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout product branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PRODUCT_BRANCH }}
          fetch-depth: 0

      - name: Merge main into product branch
        id: merge
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git fetch origin "${PRODUCT_BRANCH}"

          git checkout -B "${PRODUCT_BRANCH}" "origin/${PRODUCT_BRANCH}"
          before="$(git rev-parse HEAD)"
          git merge --no-ff --no-edit origin/main
          after="$(git rev-parse HEAD)"

          if [ "${before}" = "${after}" ]; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Push product branch
        if: steps.merge.outputs.changed == 'true'
        run: git push origin "${PRODUCT_BRANCH}"
